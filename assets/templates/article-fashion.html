<!-- WeChat Article Template: Fashion Editorial (时尚) -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Magazine editorial style. High contrast, dramatic whitespace. -->
<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto;">

  <!-- Hero Image (full-width, no radius) -->
  <img src="{{HERO_IMAGE_URL}}" style="display: block; width: 100%; height: auto; margin: 0;">

  <!-- Title Section -->
  <div style="padding: 48px 24px 24px 24px; text-align: center;">
    <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 6px; text-transform: uppercase; margin: 0 0 16px 0;">
      {{CATEGORY_LABEL}}
    </p>
    <h1 style="font-size: 26px; font-weight: bold; color: #1A1A1A; line-height: 1.3; margin: 0 0 8px 0; letter-spacing: 2px;">
      {{ARTICLE_TITLE}}
    </h1>
    <p style="font-size: 15px; color: #4D4D4D; line-height: 1.6; margin: 12px 0 0 0; font-style: italic;">
      {{SUBTITLE}}
    </p>
    <div style="width: 30px; height: 1px; background: #C41E3A; margin: 20px auto 0;"></div>
  </div>

  <!-- Article Body -->
  <div style="padding: 0 24px;">

    {{ARTICLE_BODY}}

    <!-- Fashion Quote Block (centered, typographic emphasis) -->
    <div style="margin: 48px 0; text-align: center; padding: 32px 16px;">
      <p style="font-size: 20px; color: #1A1A1A; line-height: 1.5; margin: 0; font-style: italic;">
        "{{FEATURE_QUOTE}}"
      </p>
      <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 4px; text-transform: uppercase; margin: 16px 0 0 0;">
        {{QUOTE_ATTRIBUTION}}
      </p>
    </div>

    {{CONTINUED_BODY}}

    <!-- Full-width image with caption -->
    <img src="{{BODY_IMAGE_URL}}" style="display: block; width: 100%; height: auto; margin: 40px 0 8px 0;">
    <p style="font-size: 12px; color: #8C8C8C; text-align: right; margin: 0 0 40px 0; font-style: italic;">
      {{IMAGE_CAPTION}}
    </p>

    {{REMAINING_BODY}}

  </div>

  <!-- Divider -->
  <div style="padding: 32px 24px 0 24px; text-align: center;">
    <div style="width: 100%; height: 1px; background: #E0E0E0;"></div>
  </div>

  <!-- Footer -->
  <div style="padding: 32px 24px 48px 24px; text-align: center;">
    <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 8px 0;">
      {{BRAND_NAME}}
    </p>
    <p style="font-size: 12px; color: #B0B0B0; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>

<!--
  Inline style reference for Fashion Editorial:
  - Body paragraph: font-size: 15px; color: #1A1A1A; line-height: 1.8; margin-bottom: 1.5em;
  - Section head: font-size: 14px; font-weight: bold; color: #1A1A1A; letter-spacing: 3px; text-transform: uppercase; margin: 48px 0 16px 0;
  - Image: display: block; width: 100%; height: auto; margin: 40px 0;
  - Accent text: color: #C41E3A; font-weight: bold;
  - Link: color: #C41E3A; text-decoration: underline;
-->


</div>
<!-- /文章内容结束 -->

<script>
function sanitizeForWechat(html){
  /* 微信会丢弃这些 CSS 属性，提前清除避免样式变形 */
  var d=document.createElement('div');
  d.innerHTML=html;
  var all=d.querySelectorAll('*');
  for(var i=0;i<all.length;i++){
    var s=all[i].getAttribute('style');
    if(!s)continue;
    /* 移除不兼容属性 */
    s=s.replace(/letter-spacing\s*:[^;"]+;?/gi,'');
    s=s.replace(/transform\s*:[^;"]+;?/gi,'');
    s=s.replace(/animation\s*:[^;"]+;?/gi,'');
    s=s.replace(/position\s*:\s*(absolute|fixed|sticky)[^;"]*;?/gi,'');
    s=s.replace(/display\s*:\s*(flex|grid)[^;"]*;?/gi,'');
    s=s.replace(/z-index\s*:[^;"]+;?/gi,'');
    /* 百分比单位改px(不安全) */
    s=s.replace(/([\d.]+)%/g,function(m,n){var v=parseFloat(n);if(v>100)return'100%';return m;});
    all[i].setAttribute('style',s.replace(/;+/g,';'));
  }
  return d.innerHTML;
}

async function copyToWechat(){
  var content=document.getElementById('article-content');
  var html=content.innerHTML;
  /* 微信安全清洗 */
  html=sanitizeForWechat(html);
  var blob=new Blob([html],{type:'text/html'});
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':blob})]);
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    /* 降级：execCommand 兜底 */
    var range=document.createRange();
    range.selectNodeContents(content);
    var sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try{document.execCommand('copy');}catch(e2){}
    sel.removeAllRanges();
    alert('请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
}
</script>
