<!-- WeChat Article Template: Fashion Editorial (时尚) -->
<!-- Magazine editorial style. High contrast, dramatic whitespace. -->
<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto;">

  <!-- Hero Image (full-width, no radius) -->
  <img src="{{HERO_IMAGE_URL}}" style="display: block; width: 100%; height: auto; margin: 0;">

  <!-- Title Section -->
  <div style="padding: 48px 24px 24px 24px; text-align: center;">
    <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 6px; text-transform: uppercase; margin: 0 0 16px 0;">
      {{CATEGORY_LABEL}}
    </p>
    <h1 style="font-size: 26px; font-weight: bold; color: #1A1A1A; line-height: 1.3; margin: 0 0 8px 0; letter-spacing: 2px;">
      {{ARTICLE_TITLE}}
    </h1>
    <p style="font-size: 15px; color: #4D4D4D; line-height: 1.6; margin: 12px 0 0 0; font-style: italic;">
      {{SUBTITLE}}
    </p>
    <div style="width: 30px; height: 1px; background: #C41E3A; margin: 20px auto 0;"></div>
  </div>

  <!-- Article Body -->
  <div style="padding: 0 24px;">

    {{ARTICLE_BODY}}

    <!-- Fashion Quote Block (centered, typographic emphasis) -->
    <div style="margin: 48px 0; text-align: center; padding: 32px 16px;">
      <p style="font-size: 20px; color: #1A1A1A; line-height: 1.5; margin: 0; font-style: italic;">
        "{{FEATURE_QUOTE}}"
      </p>
      <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 4px; text-transform: uppercase; margin: 16px 0 0 0;">
        {{QUOTE_ATTRIBUTION}}
      </p>
    </div>

    {{CONTINUED_BODY}}

    <!-- Full-width image with caption -->
    <img src="{{BODY_IMAGE_URL}}" style="display: block; width: 100%; height: auto; margin: 40px 0 8px 0;">
    <p style="font-size: 12px; color: #8C8C8C; text-align: right; margin: 0 0 40px 0; font-style: italic;">
      {{IMAGE_CAPTION}}
    </p>

    {{REMAINING_BODY}}

  </div>

  <!-- Divider -->
  <div style="padding: 32px 24px 0 24px; text-align: center;">
    <div style="width: 100%; height: 1px; background: #E0E0E0;"></div>
  </div>

  <!-- Footer -->
  <div style="padding: 32px 24px 48px 24px; text-align: center;">
    <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 8px 0;">
      {{BRAND_NAME}}
    </p>
    <p style="font-size: 12px; color: #B0B0B0; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>

<!--
  Inline style reference for Fashion Editorial:
  - Body paragraph: font-size: 15px; color: #1A1A1A; line-height: 1.8; margin-bottom: 1.5em;
  - Section head: font-size: 14px; font-weight: bold; color: #1A1A1A; letter-spacing: 3px; text-transform: uppercase; margin: 48px 0 16px 0;
  - Image: display: block; width: 100%; height: auto; margin: 40px 0;
  - Accent text: color: #C41E3A; font-weight: bold;
  - Link: color: #C41E3A; text-decoration: underline;
-->
