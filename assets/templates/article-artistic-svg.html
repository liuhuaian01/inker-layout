<!-- WeChat Article Template: Gallery Artistic + SVG Timeline (艺术+SVG时间线) -->
<!-- Serif-forward exhibition/portfolio article with animated timeline -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto; padding: 40px 32px 0 32px;">

  <!-- Title -->
  <p style="font-size: 12px; color: #888888; letter-spacing: 8px; text-transform: uppercase; margin: 0 0 24px 0; text-align: center;">
    {{SECTION_LABEL}}
  </p>
  <h1 style="font-size: 24px; font-weight: normal; color: #1C1C1C; line-height: 1.5; margin: 0 0 40px 0; text-align: center; font-family: 'Songti SC', 'SimSun', 'Noto Serif CJK SC', serif;">
    {{ARTICLE_TITLE}}
  </h1>

  <!-- SVG Animated Timeline -->
  <div style="margin: 0 0 48px 0;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 613 {{TIMELINE_HEIGHT}}" width="100%" height="auto"
         style="display: block; margin: 0 auto;">

      <defs>
        <style>
          @keyframes drawTimeline {
            from { stroke-dashoffset: 2000; }
            to { stroke-dashoffset: 0; }
          }
          @keyframes dotAppear {
            from { r: 0; opacity: 0; }
            to { r: 6; opacity: 1; }
          }
          @keyframes fadeSlideRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
          }
          .timeline-line {
            stroke-dasharray: 2000;
            animation: drawTimeline 2s ease-out forwards;
          }
          .dot-1 { animation: dotAppear 0.5s 0.3s ease-out both; }
          .dot-2 { animation: dotAppear 0.5s 1.0s ease-out both; }
          .dot-3 { animation: dotAppear 0.5s 1.7s ease-out both; }
          .dot-4 { animation: dotAppear 0.5s 2.4s ease-out both; }
          .text-1 { animation: fadeSlideRight 0.6s 0.5s ease-out both; }
          .text-2 { animation: fadeSlideRight 0.6s 1.2s ease-out both; }
          .text-3 { animation: fadeSlideRight 0.6s 1.9s ease-out both; }
          .text-4 { animation: fadeSlideRight 0.6s 2.6s ease-out both; }
        </style>
      </defs>

      <!-- Timeline vertical line -->
      <line x1="40" y1="30" x2="40" y2="{{TIMELINE_END}}" stroke="#D0D0D0" stroke-width="1" class="timeline-line"/>

      <!-- Milestone 1 -->
      <circle cx="40" cy="80" r="6" fill="#1C1C1C" class="dot-1"/>
      <text x="70" y="76" font-size="12" fill="#888888" class="text-1"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DATE1}}</text>
      <text x="70" y="98" font-size="16" font-weight="bold" fill="#1C1C1C" class="text-1"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{TITLE1}}</text>
      <text x="70" y="120" font-size="13" fill="#555555" class="text-1"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DESC1}}</text>

      <!-- Milestone 2 -->
      <circle cx="40" cy="{{Y2}}" r="6" fill="#1C1C1C" class="dot-2"/>
      <text x="70" y="{{Y2_TEXT}}" font-size="12" fill="#888888" class="text-2"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DATE2}}</text>
      <text x="70" y="{{Y2_TEXT2}}" font-size="16" font-weight="bold" fill="#1C1C1C" class="text-2"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{TITLE2}}</text>
      <text x="70" y="{{Y2_TEXT3}}" font-size="13" fill="#555555" class="text-2"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DESC2}}</text>

      <!-- Milestone 3 -->
      <circle cx="40" cy="{{Y3}}" r="6" fill="#D4A574" class="dot-3"/>
      <text x="70" y="{{Y3_TEXT}}" font-size="12" fill="#888888" class="text-3"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DATE3}}</text>
      <text x="70" y="{{Y3_TEXT2}}" font-size="16" font-weight="bold" fill="#1C1C1C" class="text-3"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{TITLE3}}</text>
      <text x="70" y="{{Y3_TEXT3}}" font-size="13" fill="#555555" class="text-3"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DESC3}}</text>

      <!-- Milestone 4 -->
      <circle cx="40" cy="{{Y4}}" r="6" fill="#1C1C1C" class="dot-4"/>
      <text x="70" y="{{Y4_TEXT}}" font-size="12" fill="#888888" class="text-4"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DATE4}}</text>
      <text x="70" y="{{Y4_TEXT2}}" font-size="16" font-weight="bold" fill="#1C1C1C" class="text-4"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{TITLE4}}</text>
      <text x="70" y="{{Y4_TEXT3}}" font-size="13" fill="#555555" class="text-4"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DESC4}}</text>

    </svg>
  </div>

  <!-- Body -->
  <div style="padding: 0;">

    {{ARTICLE_BODY}}

    <!-- Ornamental divider -->
    <div style="margin: 48px 0; text-align: center;">
      <span style="display: inline-block; width: 40px; height: 1px; background: #1C1C1C;"></span>
      <span style="display: inline-block; width: 6px; height: 6px; margin: 0 12px; vertical-align: middle; background: #D4A574; border-radius: 50%;"></span>
      <span style="display: inline-block; width: 40px; height: 1px; background: #1C1C1C;"></span>
    </div>

    {{CONTINUED_BODY}}

    <!-- Footer -->
    <div style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #E0E0E0; text-align: center; padding-bottom: 48px;">
      <p style="font-size: 12px; color: #888888; margin: 0 0 8px 0; letter-spacing: 2px;">
        {{PUBLICATION_NAME}}
      </p>
      <p style="font-size: 11px; color: #B0B0B0; margin: 0;">
        {{FOOTER_TEXT}}
      </p>
    </div>

  </div>

</div>
