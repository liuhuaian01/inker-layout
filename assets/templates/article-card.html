<!-- WeChat Article Template: Card Grid Content Layout -->
<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto; padding: 32px 16px 24px;">

  <!-- Title -->
  <h1 style="font-size: 22px; font-weight: bold; color: #333333; line-height: 1.4; margin: 0 0 8px 0; text-align: center;">
    {{ARTICLE_TITLE}}
  </h1>
  <p style="font-size: 13px; color: #999999; text-align: center; margin: 0 0 32px 0;">
    {{AUTHOR_NAME}} · {{PUBLISH_DATE}}
  </p>

  <!-- Card Row 1 — Two Columns -->
  <table style="width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 16px;">
    <tr>
      <td style="width: 50%; padding: 8px; vertical-align: top;">
        <div style="padding: 24px 16px; background: #F9F7F4; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center;">
          <p style="font-size: 32px; margin: 0 0 8px 0;">{{CARD1_ICON}}</p>
          <h3 style="font-size: 16px; font-weight: bold; color: #333333; margin: 0 0 6px 0;">{{CARD1_TITLE}}</h3>
          <p style="font-size: 13px; color: #666666; line-height: 1.6; margin: 0;">{{CARD1_DESC}}</p>
        </div>
      </td>
      <td style="width: 50%; padding: 8px; vertical-align: top;">
        <div style="padding: 24px 16px; background: #F9F7F4; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center;">
          <p style="font-size: 32px; margin: 0 0 8px 0;">{{CARD2_ICON}}</p>
          <h3 style="font-size: 16px; font-weight: bold; color: #333333; margin: 0 0 6px 0;">{{CARD2_TITLE}}</h3>
          <p style="font-size: 13px; color: #666666; line-height: 1.6; margin: 0;">{{CARD2_DESC}}</p>
        </div>
      </td>
    </tr>
  </table>

  <!-- Card Row 2 — Two Columns -->
  <table style="width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 16px;">
    <tr>
      <td style="width: 50%; padding: 8px; vertical-align: top;">
        <div style="padding: 24px 16px; background: #F9F7F4; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center;">
          <p style="font-size: 32px; margin: 0 0 8px 0;">{{CARD3_ICON}}</p>
          <h3 style="font-size: 16px; font-weight: bold; color: #333333; margin: 0 0 6px 0;">{{CARD3_TITLE}}</h3>
          <p style="font-size: 13px; color: #666666; line-height: 1.6; margin: 0;">{{CARD3_DESC}}</p>
        </div>
      </td>
      <td style="width: 50%; padding: 8px; vertical-align: top;">
        <div style="padding: 24px 16px; background: #F9F7F4; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center;">
          <p style="font-size: 32px; margin: 0 0 8px 0;">{{CARD4_ICON}}</p>
          <h3 style="font-size: 16px; font-weight: bold; color: #333333; margin: 0 0 6px 0;">{{CARD4_TITLE}}</h3>
          <p style="font-size: 13px; color: #666666; line-height: 1.6; margin: 0;">{{CARD4_DESC}}</p>
        </div>
      </td>
    </tr>
  </table>

  <!-- Footer -->
  <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid #EEEEEE; text-align: center;">
    <p style="font-size: 13px; color: #999999; margin: 0;">{{FOOTER_TEXT}}</p>
  </div>

</div>
