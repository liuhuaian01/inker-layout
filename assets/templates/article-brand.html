<!-- WeChat Article Template: Brand Announcement / Product Launch -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto;">

  <!-- Hero Banner -->
  <div style="background: linear-gradient(135deg, {{BRAND_COLOR_PRIMARY}} 0%, {{BRAND_COLOR_SECONDARY}} 100%); padding: 48px 24px; text-align: center; border-radius: 0 0 16px 16px;">
    <p style="font-size: 13px; color: rgba(255,255,255,0.7); margin: 0 0 12px 0; letter-spacing: 4px; text-transform: uppercase;">
      {{BRAND_TAGLINE}}
    </p>
    <h1 style="font-size: 24px; font-weight: bold; color: #FFFFFF; line-height: 1.3; margin: 0;">
      {{ANNOUNCEMENT_TITLE}}
    </h1>
  </div>

  <!-- Content -->
  <div style="padding: 24px 16px;">

    <!-- Key Message -->
    <div style="margin-bottom: 32px;">
      <p style="font-size: 18px; font-weight: bold; color: #333333; line-height: 1.5; margin: 0 0 16px 0; text-align: center;">
        {{KEY_MESSAGE}}
      </p>
      <div style="width: 40px; height: 3px; background: {{BRAND_COLOR_PRIMARY}}; margin: 0 auto;"></div>
    </div>

    {{ARTICLE_BODY}}

    <!-- CTA -->
    <div style="text-align: center; margin: 40px 0 24px;">
      <a href="{{CTA_LINK}}" style="display: inline-block; padding: 14px 40px; background: {{BRAND_COLOR_PRIMARY}}; color: #FFFFFF; font-size: 16px; font-weight: bold; border-radius: 30px; text-decoration: none;">
        {{CTA_TEXT}}
      </a>
    </div>

  </div>

  <!-- Footer -->
  <div style="padding: 24px 16px; background: #F7F7F7; text-align: center; border-radius: 16px 16px 0 0;">
    <p style="font-size: 13px; color: #999999; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>


</div>
<!-- /文章内容结束 -->

<script>
function copyToWechat(){
  var content=document.getElementById('article-content');
  var range=document.createRange();
  range.selectNodeContents(content);
  var sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{
    document.execCommand('copy');
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    alert('复制失败，请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
  sel.removeAllRanges();
}
</script>
