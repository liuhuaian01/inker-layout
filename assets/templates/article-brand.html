<!-- WeChat Article Template: Brand Announcement / Product Launch -->
<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto;">

  <!-- Hero Banner -->
  <div style="background: linear-gradient(135deg, {{BRAND_COLOR_PRIMARY}} 0%, {{BRAND_COLOR_SECONDARY}} 100%); padding: 48px 24px; text-align: center; border-radius: 0 0 16px 16px;">
    <p style="font-size: 13px; color: rgba(255,255,255,0.7); margin: 0 0 12px 0; letter-spacing: 4px; text-transform: uppercase;">
      {{BRAND_TAGLINE}}
    </p>
    <h1 style="font-size: 24px; font-weight: bold; color: #FFFFFF; line-height: 1.3; margin: 0;">
      {{ANNOUNCEMENT_TITLE}}
    </h1>
  </div>

  <!-- Content -->
  <div style="padding: 24px 16px;">

    <!-- Key Message -->
    <div style="margin-bottom: 32px;">
      <p style="font-size: 18px; font-weight: bold; color: #333333; line-height: 1.5; margin: 0 0 16px 0; text-align: center;">
        {{KEY_MESSAGE}}
      </p>
      <div style="width: 40px; height: 3px; background: {{BRAND_COLOR_PRIMARY}}; margin: 0 auto;"></div>
    </div>

    {{ARTICLE_BODY}}

    <!-- CTA -->
    <div style="text-align: center; margin: 40px 0 24px;">
      <a href="{{CTA_LINK}}" style="display: inline-block; padding: 14px 40px; background: {{BRAND_COLOR_PRIMARY}}; color: #FFFFFF; font-size: 16px; font-weight: bold; border-radius: 30px; text-decoration: none;">
        {{CTA_TEXT}}
      </a>
    </div>

  </div>

  <!-- Footer -->
  <div style="padding: 24px 16px; background: #F7F7F7; text-align: center; border-radius: 16px 16px 0 0;">
    <p style="font-size: 13px; color: #999999; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>
