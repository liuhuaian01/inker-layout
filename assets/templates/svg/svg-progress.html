<!-- SVG Template: Animated Progress Bar / Countdown -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Auto-animated progress with count/percentage display -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto;">

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 {{SVG_HEIGHT}}" width="100%" height="auto"
       style="display: block; margin: 0 auto;">

    <defs>
      <style>
        @keyframes countUp {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes pulseValue {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.1); }
        }
        .count-anim { animation: countUp 0.5s ease-out both; }
        .pulse { animation: pulseValue 2s ease-in-out infinite; }
      </style>

      <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="{{PROGRESS_COLOR_START}}"/>
        <stop offset="100%" stop-color="{{PROGRESS_COLOR_END}}"/>
      </linearGradient>

      <linearGradient id="progressBgGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="{{BG_COLOR_START}}"/>
        <stop offset="100%" stop-color="{{BG_COLOR_END}}"/>
      </linearGradient>

      <filter id="progressGlow" x="-10%" y="-50%" width="120%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Title -->
    <text x="339" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{PROGRESS_TITLE}}
    </text>

    <!-- Subtitle / description -->
    <text x="339" y="68" text-anchor="middle" font-size="13" fill="#999999"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{PROGRESS_SUBTITLE}}
    </text>

    <!-- Progress bar background -->
    <rect x="50" y="100" width="577" height="{{BAR_HEIGHT}}" rx="{{BAR_RADIUS}}" fill="url(#progressBgGrad)"/>

    <!-- Progress bar fill -->
    <rect x="50" y="100" width="0" height="{{BAR_HEIGHT}}" rx="{{BAR_RADIUS}}" fill="url(#progressGrad)" filter="url(#progressGlow)">
      <animate attributeName="width" from="0" to="{{FILL_WIDTH}}" dur="{{ANIM_DURATION}}s" fill="freeze"/>
    </rect>

    <!-- Percentage / count -->
    <text x="339" y="{{VALUE_Y}}" text-anchor="middle" font-size="{{VALUE_SIZE}}" font-weight="bold" fill="{{VALUE_COLOR}}" class="pulse"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{PROGRESS_VALUE}}
    </text>

    <!-- Label below percentage -->
    <text x="339" y="{{LABEL_Y}}" text-anchor="middle" font-size="14" fill="#666666"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{PROGRESS_LABEL}}
    </text>

    {{ADDITIONAL_ITEMS}}

  </svg>

</div>


</div>
<!-- /文章内容结束 -->

<script>
function copyToWechat(){
  var content=document.getElementById('article-content');
  var range=document.createRange();
  range.selectNodeContents(content);
  var sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{
    document.execCommand('copy');
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    alert('复制失败，请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
  sel.removeAllRanges();
}
</script>
