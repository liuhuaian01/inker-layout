<!-- SVG Component: Click Hotspot Image Map (图片热区点击) -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Full-width image with clickable transparent regions linking to different URLs -->
<!-- Reliable cross-platform — uses only <a xlink:href> inside SVG -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto;">

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 {{IMAGE_HEIGHT}}" width="100%" height="auto"
       style="display: block; margin: 0 auto; border-radius: 12px; overflow: hidden;">

    <defs>
      <style>
        @keyframes hotspotPulse {
          0%, 100% { opacity: 0; }
          50% { opacity: 1; }
        }
        @keyframes fadeInHint {
          0%, 70% { opacity: 0; transform: translateY(8px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        .hotspot-indicator { animation: hotspotPulse 2s ease-in-out infinite; }
        .hint { animation: fadeInHint 1.5s 0.5s ease-out both; }
      </style>
    </defs>

    <!-- Background image -->
    <image href="{{BACKGROUND_IMAGE}}" x="0" y="0" width="677" height="{{IMAGE_HEIGHT}}" preserveAspectRatio="xMidYMid slice"/>

    <!-- Semi-transparent overlay for hotspots -->
    <rect x="0" y="0" width="677" height="{{IMAGE_HEIGHT}}" fill="rgba(0,0,0,0.15)"/>

    <!-- Hotspot 1 -->
    <a xlink:href="{{HOTSPOT1_URL}}" target="_blank">
      <!-- Clickable area -->
      <rect x="{{HS1_X}}" y="{{HS1_Y}}" width="{{HS1_W}}" height="{{HS1_H}}" rx="12" fill="rgba(255,255,255,0.15)"/>
      <!-- Pulse indicator ring -->
      <rect x="{{HS1_X}}" y="{{HS1_Y}}" width="{{HS1_W}}" height="{{HS1_H}}" rx="12" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
      <rect x="{{HS1_X}}" y="{{HS1_Y}}" width="{{HS1_W}}" height="{{HS1_H}}" rx="12" fill="none" stroke="#FFFFFF" stroke-width="2" class="hotspot-indicator"/>
      <!-- Label -->
      <text x="{{HS1_CX}}" y="{{HS1_CY}}" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{HS1_LABEL}}</text>
      <text x="{{HS1_CX}}" y="{{HS1_CY2}}" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)" class="hint"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">点击查看 →</text>
    </a>

    <!-- Hotspot 2 -->
    <a xlink:href="{{HOTSPOT2_URL}}" target="_blank">
      <rect x="{{HS2_X}}" y="{{HS2_Y}}" width="{{HS2_W}}" height="{{HS2_H}}" rx="12" fill="rgba(255,255,255,0.15)"/>
      <rect x="{{HS2_X}}" y="{{HS2_Y}}" width="{{HS2_W}}" height="{{HS2_H}}" rx="12" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
      <rect x="{{HS2_X}}" y="{{HS2_Y}}" width="{{HS2_W}}" height="{{HS2_H}}" rx="12" fill="none" stroke="#FFFFFF" stroke-width="2" class="hotspot-indicator"/>
      <text x="{{HS2_CX}}" y="{{HS2_CY}}" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{HS2_LABEL}}</text>
      <text x="{{HS2_CX}}" y="{{HS2_CY2}}" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)" class="hint"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">点击查看 →</text>
    </a>

    <!-- Hotspot 3 (optional) -->
    {{HOTSPOT3}}

    <!-- Hotspot 4 (optional) -->
    {{HOTSPOT4}}

    <!-- Title overlay -->
    <text x="339" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{OVERLAY_TITLE}}
    </text>

  </svg>

</div>

<!--
  Optional additional hotspots (paste these into {{HOTSPOT3}} / {{HOTSPOT4}}):

  <a xlink:href="{{URL}}" target="_blank">
    <rect x="{{X}}" y="{{Y}}" width="{{W}}" height="{{H}}" rx="12" fill="rgba(255,255,255,0.15)"/>
    <rect x="{{X}}" y="{{Y}}" width="{{W}}" height="{{H}}" rx="12" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <rect x="{{X}}" y="{{Y}}" width="{{W}}" height="{{H}}" rx="12" fill="none" stroke="#FFFFFF" stroke-width="2" class="hotspot-indicator"/>
    <text x="{{CX}}" y="{{CY}}" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">Label</text>
    <text x="{{CX}}" y="{{CY2}}" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)" class="hint">点击查看 →</text>
  </a>
-->


</div>
<!-- /文章内容结束 -->

<script>
function sanitizeForWechat(html){
  /* 微信会丢弃这些 CSS 属性，提前清除避免样式变形 */
  var d=document.createElement('div');
  d.innerHTML=html;
  var all=d.querySelectorAll('*');
  for(var i=0;i<all.length;i++){
    var s=all[i].getAttribute('style');
    if(!s)continue;
    /* 移除不兼容属性 */
    s=s.replace(/letter-spacing\s*:[^;"]+;?/gi,'');
    s=s.replace(/transform\s*:[^;"]+;?/gi,'');
    s=s.replace(/animation\s*:[^;"]+;?/gi,'');
    s=s.replace(/position\s*:\s*(absolute|fixed|sticky)[^;"]*;?/gi,'');
    s=s.replace(/display\s*:\s*(flex|grid)[^;"]*;?/gi,'');
    s=s.replace(/z-index\s*:[^;"]+;?/gi,'');
    /* 百分比单位改px(不安全) */
    s=s.replace(/([\d.]+)%/g,function(m,n){var v=parseFloat(n);if(v>100)return'100%';return m;});
    all[i].setAttribute('style',s.replace(/;+/g,';'));
  }
  return d.innerHTML;
}

async function copyToWechat(){
  var content=document.getElementById('article-content');
  var html=content.innerHTML;
  /* 微信安全清洗 */
  html=sanitizeForWechat(html);
  var blob=new Blob([html],{type:'text/html'});
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':blob})]);
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    /* 降级：execCommand 兜底 */
    var range=document.createRange();
    range.selectNodeContents(content);
    var sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try{document.execCommand('copy');}catch(e2){}
    sel.removeAllRanges();
    alert('请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
}
</script>
