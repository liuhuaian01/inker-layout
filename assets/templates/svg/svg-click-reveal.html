<!-- SVG Template: Click/Tap to Reveal Content -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Uses CSS animation with staggered timing to simulate click-to-reveal -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto;">

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 {{SVG_HEIGHT}}" width="100%" height="auto"
       style="display: block; margin: 0 auto;">

    <defs>
      <style>
        @keyframes fadeInCard {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseHint {
          0%, 100% { opacity: 0.6; }
          50% { opacity: 1; }
        }
        .card-1 { animation: fadeInCard 0.5s 0.5s ease-out both; }
        .card-2 { animation: fadeInCard 0.5s 0.9s ease-out both; }
        .card-3 { animation: fadeInCard 0.5s 1.3s ease-out both; }
        .card-4 { animation: fadeInCard 0.5s 1.7s ease-out both; }
        .hint { animation: pulseHint 2s ease-in-out infinite; }
        {{CUSTOM_CSS}}
      </style>

      <!-- Card background gradient -->
      <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="{{CARD_COLOR_START}}"/>
        <stop offset="100%" stop-color="{{CARD_COLOR_END}}"/>
      </linearGradient>

      <!-- Shadow filter -->
      <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
      </filter>
    </defs>

    <!-- Title -->
    <text x="339" y="50" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{SECTION_TITLE}}
    </text>

    <!-- Hint text -->
    <text x="339" y="78" text-anchor="middle" font-size="12" fill="#999999" class="hint"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{HINT_TEXT}}
    </text>

    <!-- Card 1 -->
    <g class="card-1">
      <rect x="24" y="100" width="629" height="{{CARD_HEIGHT}}" rx="12" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
      <text x="44" y="132" font-size="16" font-weight="bold" fill="{{CARD_TEXT_COLOR}}"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{CARD1_TITLE}}</text>
      <text x="44" y="158" font-size="14" fill="{{CARD_TEXT_COLOR}}"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{CARD1_CONTENT}}</text>
    </g>

    <!-- Card 2 -->
    <g class="card-2">
      <rect x="24" y="{{CARD2_Y}}" width="629" height="{{CARD_HEIGHT}}" rx="12" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
      <text x="44" y="{{CARD2_TEXT_Y}}" font-size="16" font-weight="bold" fill="{{CARD_TEXT_COLOR}}"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{CARD2_TITLE}}</text>
      <text x="44" y="{{CARD2_TEXT_Y2}}" font-size="14" fill="{{CARD_TEXT_COLOR}}"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{CARD2_CONTENT}}</text>
    </g>

    <!-- Card 3 -->
    <g class="card-3">
      <rect x="24" y="{{CARD3_Y}}" width="629" height="{{CARD_HEIGHT}}" rx="12" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
      <text x="44" y="{{CARD3_TEXT_Y}}" font-size="16" font-weight="bold" fill="{{CARD_TEXT_COLOR}}"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{CARD3_TITLE}}</text>
      <text x="44" y="{{CARD3_TEXT_Y2}}" font-size="14" fill="{{CARD_TEXT_COLOR}}"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{CARD3_CONTENT}}</text>
    </g>

    {{ADDITIONAL_CARDS}}

  </svg>

</div>


</div>
<!-- /文章内容结束 -->

<script>
function sanitizeForWechat(html){
  /* 微信会丢弃这些 CSS 属性，提前清除避免样式变形 */
  var d=document.createElement('div');
  d.innerHTML=html;
  var all=d.querySelectorAll('*');
  for(var i=0;i<all.length;i++){
    var s=all[i].getAttribute('style');
    if(!s)continue;
    /* 移除不兼容属性 */
    s=s.replace(/letter-spacing\s*:[^;"]+;?/gi,'');
    s=s.replace(/transform\s*:[^;"]+;?/gi,'');
    s=s.replace(/animation\s*:[^;"]+;?/gi,'');
    s=s.replace(/position\s*:\s*(absolute|fixed|sticky)[^;"]*;?/gi,'');
    s=s.replace(/display\s*:\s*(flex|grid)[^;"]*;?/gi,'');
    s=s.replace(/z-index\s*:[^;"]+;?/gi,'');
    /* 百分比单位改px(不安全) */
    s=s.replace(/([\d.]+)%/g,function(m,n){var v=parseFloat(n);if(v>100)return'100%';return m;});
    all[i].setAttribute('style',s.replace(/;+/g,';'));
  }
  return d.innerHTML;
}

async function copyToWechat(){
  var content=document.getElementById('article-content');
  var html=content.innerHTML;
  /* 微信安全清洗 */
  html=sanitizeForWechat(html);
  var blob=new Blob([html],{type:'text/html'});
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':blob})]);
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    /* 降级：execCommand 兜底 */
    var range=document.createRange();
    range.selectNodeContents(content);
    var sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try{document.execCommand('copy');}catch(e2){}
    sel.removeAllRanges();
    alert('请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
}
</script>
