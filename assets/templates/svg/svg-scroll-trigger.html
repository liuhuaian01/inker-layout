<!-- SVG Template: Scroll-Triggered CSS Animations -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Elements reveal in sequence as the user scrolls (simulated via staggered animation-delay) -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto;">

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 {{SVG_HEIGHT}}" width="100%" height="auto"
       style="display: block; margin: 0 auto;">

    <defs>
      <style>
        /* Reveal animations */
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(40px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideLeft {
          from { opacity: 0; transform: translateX(40px); }
          to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideRight {
          from { opacity: 0; transform: translateX(-40px); }
          to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
          from { opacity: 0; transform: scale(0.8); }
          to { opacity: 1; transform: scale(1); }
        }
        @keyframes drawLine {
          from { stroke-dashoffset: 1000; }
          to { stroke-dashoffset: 0; }
        }

        /* Staggered reveal for 8 items (0.3s spacing) */
        .reveal-1 { animation: slideUp 0.6s 0.2s ease-out both; }
        .reveal-2 { animation: slideUp 0.6s 0.5s ease-out both; }
        .reveal-3 { animation: slideUp 0.6s 0.8s ease-out both; }
        .reveal-4 { animation: slideUp 0.6s 1.1s ease-out both; }
        .reveal-5 { animation: slideUp 0.6s 1.4s ease-out both; }
        .reveal-6 { animation: slideUp 0.6s 1.7s ease-out both; }
        .reveal-7 { animation: slideUp 0.6s 2.0s ease-out both; }
        .reveal-8 { animation: slideUp 0.6s 2.3s ease-out both; }

        /* Line draw */
        .line-draw {
          stroke-dasharray: 1000;
          animation: drawLine 1.5s 0.5s ease-out forwards;
        }

        {{CUSTOM_CSS}}
      </style>

      <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="{{ACCENT_COLOR}}"/>
        <stop offset="100%" stop-color="{{ACCENT_COLOR_ALT}}"/>
      </linearGradient>
    </defs>

    <!-- Background decorative line -->
    <line x1="40" y1="0" x2="40" y2="{{SVG_HEIGHT}}" stroke="#EEEEEE" stroke-width="2" class="line-draw"/>

    {{REVEAL_ITEMS}}

  </svg>

</div>

<!--
  Reveal Item Template — copy for each item, adjust Y position and class:
  <g class="reveal-1">
    <circle cx="40" cy="120" r="8" fill="url(#accentGrad)"/>
    <text x="70" y="116" font-size="16" font-weight="bold" fill="#333333"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{ITEM_TITLE}}
    </text>
    <text x="70" y="140" font-size="14" fill="#666666"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{ITEM_DESCRIPTION}}
    </text>
  </g>
-->


</div>
<!-- /文章内容结束 -->

<script>
function copyToWechat(){
  var content=document.getElementById('article-content');
  var range=document.createRange();
  range.selectNodeContents(content);
  var sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{
    document.execCommand('copy');
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    alert('复制失败，请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
  sel.removeAllRanges();
}
</script>
