<!-- SVG Template: Animated Timeline with Scroll Reveal -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Milestones appear sequentially with line drawing and dot popping -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto;">

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 {{SVG_HEIGHT}}" width="100%" height="auto"
       style="display: block; margin: 0 auto;">

    <defs>
      <style>
        @keyframes lineGrow {
          from { stroke-dashoffset: {{LINE_LENGTH}}; }
          to { stroke-dashoffset: 0; }
        }
        @keyframes dotPop {
          from { r: 0; }
          to { r: 8; }
        }
        @keyframes fadeInRight {
          from { opacity: 0; transform: translateX(20px); }
          to { opacity: 1; transform: translateX(0); }
        }
        .timeline-line {
          stroke-dasharray: {{LINE_LENGTH}};
          animation: lineGrow 2s 0.3s ease-out forwards;
        }
        .dot-1 { animation: dotPop 0.4s 0.5s ease-out both; }
        .dot-2 { animation: dotPop 0.4s 1.0s ease-out both; }
        .dot-3 { animation: dotPop 0.4s 1.5s ease-out both; }
        .dot-4 { animation: dotPop 0.4s 2.0s ease-out both; }
        .dot-5 { animation: dotPop 0.4s 2.5s ease-out both; }
        .content-1 { animation: fadeInRight 0.5s 0.7s ease-out both; }
        .content-2 { animation: fadeInRight 0.5s 1.2s ease-out both; }
        .content-3 { animation: fadeInRight 0.5s 1.7s ease-out both; }
        .content-4 { animation: fadeInRight 0.5s 2.2s ease-out both; }
        .content-5 { animation: fadeInRight 0.5s 2.7s ease-out both; }
      </style>

      <linearGradient id="dotGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="{{ACCENT_COLOR}}"/>
        <stop offset="100%" stop-color="{{ACCENT_COLOR_ALT}}"/>
      </linearGradient>
    </defs>

    <!-- Title -->
    <text x="339" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">
      {{TIMELINE_TITLE}}
    </text>

    <!-- Vertical line -->
    <line x1="52" y1="80" x2="52" y2="{{LINE_END}}" stroke="#E0D5C5" stroke-width="3" class="timeline-line"/>

    {{TIMELINE_ITEMS}}

  </svg>

</div>

<!--
  Timeline Item Template:
  <circle cx="52" cy="140" r="8" fill="url(#dotGrad)" class="dot-1"/>
  <g class="content-1">
    <text x="80" y="134" font-size="13" fill="#999999"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DATE}}</text>
    <text x="80" y="156" font-size="16" font-weight="bold" fill="#333333"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">{{EVENT_TITLE}}</text>
    <text x="80" y="178" font-size="14" fill="#666666"
          font-family="PingFang SC, Microsoft YaHei, sans-serif">{{EVENT_DESCRIPTION}}</text>
  </g>
-->


</div>
<!-- /文章内容结束 -->

<script>
function sanitizeForWechat(html){
  /* 微信会丢弃这些 CSS 属性，提前清除避免样式变形 */
  var d=document.createElement('div');
  d.innerHTML=html;
  var all=d.querySelectorAll('*');
  for(var i=0;i<all.length;i++){
    var s=all[i].getAttribute('style');
    if(!s)continue;
    /* 移除不兼容属性 */
    s=s.replace(/letter-spacing\s*:[^;"]+;?/gi,'');
    s=s.replace(/transform\s*:[^;"]+;?/gi,'');
    s=s.replace(/animation\s*:[^;"]+;?/gi,'');
    s=s.replace(/position\s*:\s*(absolute|fixed|sticky)[^;"]*;?/gi,'');
    s=s.replace(/display\s*:\s*(flex|grid)[^;"]*;?/gi,'');
    s=s.replace(/z-index\s*:[^;"]+;?/gi,'');
    /* 百分比单位改px(不安全) */
    s=s.replace(/([\d.]+)%/g,function(m,n){var v=parseFloat(n);if(v>100)return'100%';return m;});
    all[i].setAttribute('style',s.replace(/;+/g,';'));
  }
  return d.innerHTML;
}

async function copyToWechat(){
  var content=document.getElementById('article-content');
  var html=content.innerHTML;
  /* 微信安全清洗 */
  html=sanitizeForWechat(html);
  var blob=new Blob([html],{type:'text/html'});
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':blob})]);
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    /* 降级：execCommand 兜底 */
    var range=document.createRange();
    range.selectNodeContents(content);
    var sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try{document.execCommand('copy');}catch(e2){}
    sel.removeAllRanges();
    alert('请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
}
</script>
