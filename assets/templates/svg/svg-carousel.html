<!-- SVG Template: Auto-Rotating Image Carousel using SMIL -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Slides cycle continuously. Replace {{PLACEHOLDER}} values. -->
<!-- Each slide should be same width (677px for standard content) -->

<div style="max-width: 677px; margin: 0 auto;">

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 {{SLIDE_HEIGHT}}" width="100%" height="auto"
       style="display: block; margin: 0 auto; border-radius: 12px; overflow: hidden;">

    <defs>
      <clipPath id="carouselClip">
        <rect x="0" y="0" width="677" height="{{SLIDE_HEIGHT}}" rx="12"/>
      </clipPath>
    </defs>

    <!-- Slides container — animated via SMIL translate -->
    <g clip-path="url(#carouselClip)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; {{SLIDE1_X}} 0; {{SLIDE2_X}} 0; {{SLIDE3_X}} 0; {{SLIDE4_X}} 0; 0 0"
          keyTimes="0; 0.2; 0.25; 0.45; 0.5; 0.7"
          dur="{{TOTAL_DURATION}}s" repeatCount="indefinite"/>

        <!-- Slide 1 -->
        <image href="{{SLIDE1_IMAGE}}" x="0" y="0" width="677" height="{{SLIDE_HEIGHT}}" preserveAspectRatio="xMidYMid slice"/>

        <!-- Slide 2 -->
        <image href="{{SLIDE2_IMAGE}}" x="677" y="0" width="677" height="{{SLIDE_HEIGHT}}" preserveAspectRatio="xMidYMid slice"/>

        <!-- Slide 3 -->
        <image href="{{SLIDE3_IMAGE}}" x="1354" y="0" width="677" height="{{SLIDE_HEIGHT}}" preserveAspectRatio="xMidYMid slice"/>

        {{ADDITIONAL_SLIDES}}
      </g>
    </g>

    <!-- Dot indicators -->
    <g transform="translate(339, {{DOTS_Y}})">
      <!-- Dot 1 -->
      <circle cx="-24" cy="0" r="5" fill="#FFFFFF" opacity="1">
        <animate attributeName="opacity" values="1;1;0.3;0.3;1;1" keyTimes="0;0.2;0.21;0.69;0.7;1" dur="{{TOTAL_DURATION}}s" repeatCount="indefinite"/>
      </circle>
      <!-- Dot 2 -->
      <circle cx="0" cy="0" r="5" fill="#FFFFFF" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.3;1;1;0.3;0.3" keyTimes="0;0.2;0.21;0.44;0.45;1" dur="{{TOTAL_DURATION}}s" repeatCount="indefinite"/>
      </circle>
      <!-- Dot 3 -->
      <circle cx="24" cy="0" r="5" fill="#FFFFFF" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.3;0.3;0.3;1;1" keyTimes="0;0.44;0.45;0.69;0.7;1" dur="{{TOTAL_DURATION}}s" repeatCount="indefinite"/>
      </circle>
    </g>

  </svg>

</div>


</div>
<!-- /文章内容结束 -->

<script>
function copyToWechat(){
  var content=document.getElementById('article-content');
  var range=document.createRange();
  range.selectNodeContents(content);
  var sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{
    document.execCommand('copy');
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    alert('复制失败，请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
  sel.removeAllRanges();
}
</script>
