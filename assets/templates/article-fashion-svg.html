<!-- WeChat Article Template: Fashion Editorial + SVG Carousel (时尚+SVG轮播) -->
<!-- Magazine-style article with auto-rotating lookbook carousel -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto;">

  <!-- Title Section -->
  <div style="padding: 40px 24px 0 24px; text-align: center;">
    <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 6px; text-transform: uppercase; margin: 0 0 16px 0;">
      {{CATEGORY_LABEL}}
    </p>
    <h1 style="font-size: 26px; font-weight: bold; color: #1A1A1A; line-height: 1.3; margin: 0; letter-spacing: 2px;">
      {{ARTICLE_TITLE}}
    </h1>
    <div style="width: 30px; height: 1px; background: #C41E3A; margin: 20px auto 0;"></div>
  </div>

  <!-- SVG Lookbook Carousel -->
  <div style="margin: 32px 0;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 677 500" width="100%" height="auto"
         style="display: block; margin: 0 auto;">

      <defs>
        <clipPath id="lookbookClip">
          <rect x="0" y="0" width="677" height="500"/>
        </clipPath>
        <style>
          @keyframes fadeTag {
            0%, 70% { opacity: 0; transform: translateY(10px); }
            80%, 100% { opacity: 1; transform: translateY(0); }
          }
          .tag-1 { animation: fadeTag 12s ease-out infinite; }
          .tag-2 { animation: fadeTag 12s 4s ease-out infinite; }
          .tag-3 { animation: fadeTag 12s 8s ease-out infinite; }
        </style>
      </defs>

      <!-- Slides container -->
      <g clip-path="url(#lookbookClip)">
        <g>
          <animateTransform attributeName="transform" type="translate"
            values="0 0; -677 0; -1354 0; -1354 0; -677 0; 0 0"
            keyTimes="0; 0.28; 0.33; 0.61; 0.66; 1"
            dur="12s" repeatCount="indefinite"/>

          <!-- Slide 1 -->
          <g>
            <rect x="0" y="0" width="677" height="500" fill="{{SLIDE1_BG_COLOR}}"/>
            <text x="339" y="220" text-anchor="middle" font-size="48" fill="#FFFFFF"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE1_ICON}}</text>
            <text x="339" y="280" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE1_TITLE}}</text>
            <text x="339" y="310" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE1_SUBTITLE}}</text>
          </g>

          <!-- Slide 2 -->
          <g>
            <rect x="677" y="0" width="677" height="500" fill="{{SLIDE2_BG_COLOR}}"/>
            <text x="677+339" y="220" text-anchor="middle" font-size="48" fill="#FFFFFF"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE2_ICON}}</text>
            <text x="677+339" y="280" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE2_TITLE}}</text>
            <text x="677+339" y="310" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE2_SUBTITLE}}</text>
          </g>

          <!-- Slide 3 -->
          <g>
            <rect x="1354" y="0" width="677" height="500" fill="{{SLIDE3_BG_COLOR}}"/>
            <text x="1354+339" y="220" text-anchor="middle" font-size="48" fill="#FFFFFF"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE3_ICON}}</text>
            <text x="1354+339" y="280" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE3_TITLE}}</text>
            <text x="1354+339" y="310" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)"
                  font-family="PingFang SC, Microsoft YaHei, sans-serif">{{SLIDE3_SUBTITLE}}</text>
          </g>
        </g>
      </g>

      <!-- Dot indicators -->
      <g transform="translate(339, 460)">
        <circle cx="-16" cy="0" r="4" fill="#FFFFFF" opacity="1">
          <animate attributeName="opacity" values="1;1;0.3;0.3;0.3;1" keyTimes="0;0.28;0.33;0.61;0.66;1" dur="12s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="4" fill="#FFFFFF" opacity="0.3">
          <animate attributeName="opacity" values="0.3;0.3;1;1;0.3;0.3" keyTimes="0;0.28;0.33;0.61;0.66;1" dur="12s" repeatCount="indefinite"/>
        </circle>
        <circle cx="16" cy="0" r="4" fill="#FFFFFF" opacity="0.3">
          <animate attributeName="opacity" values="0.3;0.3;0.3;0.3;1;1" keyTimes="0;0.28;0.33;0.61;0.66;1" dur="12s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Tag labels (fade in/out per slide) -->
      <text x="24" y="40" font-size="11" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, sans-serif"
            letter-spacing="4" class="tag-1">{{SLIDE1_TAG}}</text>
      <text x="24" y="40" font-size="11" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, sans-serif"
            letter-spacing="4" class="tag-2">{{SLIDE2_TAG}}</text>
      <text x="24" y="40" font-size="11" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, sans-serif"
            letter-spacing="4" class="tag-3">{{SLIDE3_TAG}}</text>

    </svg>
  </div>

  <!-- Body -->
  <div style="padding: 24px 24px 0 24px;">

    <p style="font-size: 16px; color: #1A1A1A; line-height: 1.8; margin: 0 0 32px 0; font-style: italic; text-align: center;">
      {{LEAD_PARAGRAPH}}
    </p>

    <div style="width: 30px; height: 1px; background: #C41E3A; margin: 0 auto 32px;"></div>

    {{ARTICLE_BODY}}

    <!-- Centered Fashion Quote -->
    <div style="margin: 48px 0; text-align: center; padding: 32px 16px;">
      <p style="font-size: 20px; color: #1A1A1A; line-height: 1.5; margin: 0; font-style: italic;">
        "{{FEATURE_QUOTE}}"
      </p>
      <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 4px; text-transform: uppercase; margin: 16px 0 0 0;">
        {{QUOTE_ATTRIBUTION}}
      </p>
    </div>

    {{CONTINUED_BODY}}

  </div>

  <!-- Footer -->
  <div style="padding: 32px 24px 48px 24px; text-align: center;">
    <div style="width: 100%; height: 1px; background: #E0E0E0; margin-bottom: 32px;"></div>
    <p style="font-size: 12px; color: #8C8C8C; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 8px 0;">
      {{BRAND_NAME}}
    </p>
    <p style="font-size: 12px; color: #B0B0B0; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>
