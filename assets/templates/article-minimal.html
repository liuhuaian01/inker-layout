<!-- WeChat Article Template: Minimalist Monochrome (极简) -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Clean, high-contrast, zero decoration. For serious/analytical content. -->
<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto; padding: 40px 24px 32px 24px;">

  <!-- Title — clean, no decoration -->
  <h1 style="font-size: 22px; font-weight: bold; color: #1A1A1A; line-height: 1.4; margin: 0 0 8px 0;">
    {{ARTICLE_TITLE}}
  </h1>

  <p style="font-size: 13px; color: #8A8A8A; margin: 0 0 40px 0;">
    {{AUTHOR_NAME}} · {{PUBLISH_DATE}}
  </p>

  <!-- 1px divider — the only decorative element -->
  <div style="width: 100%; height: 1px; background: #1A1A1A; margin: 0 0 40px 0;"></div>

  {{ARTICLE_BODY}}

  <!-- Image — clean, full-width, no radius -->
  <img src="{{BODY_IMAGE_URL}}" style="display: block; width: 100%; height: auto; margin: 40px 0;">

  {{CONTINUED_BODY}}

  <!-- Simple list -->
  <ul style="margin: 32px 0; padding: 0; list-style: none;">
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM1}}
    </li>
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM2}}
    </li>
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM3}}
    </li>
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM4}}
    </li>
  </ul>

  {{MORE_BODY}}

  <!-- Quote — minimal treatment -->
  <div style="margin: 40px 0; padding: 0 0 0 16px; border-left: 2px solid #1A1A1A;">
    <p style="font-size: 15px; color: #4A4A4A; line-height: 1.8; margin: 0;">
      "{{MINIMAL_QUOTE}}"
    </p>
    <p style="font-size: 13px; color: #8A8A8A; margin: 12px 0 0 0;">
      {{QUOTE_ATTRIBUTION}}
    </p>
  </div>

  {{REMAINING_BODY}}

  <!-- Footer — simple underline link -->
  <div style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #E5E5E5;">
    <p style="font-size: 14px; color: #1A1A1A; margin: 0 0 16px 0;">
      <a href="{{RELATED_URL}}" style="color: #1A1A1A; text-decoration: underline; text-underline-offset: 3px;">{{RELATED_TEXT}}</a>
    </p>
    <p style="font-size: 12px; color: #8A8A8A; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>


</div>
<!-- /文章内容结束 -->

<script>
function copyToWechat(){
  var content=document.getElementById('article-content');
  var range=document.createRange();
  range.selectNodeContents(content);
  var sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{
    document.execCommand('copy');
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    alert('复制失败，请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
  sel.removeAllRanges();
}
</script>
