<!-- WeChat Article Template: Minimalist Monochrome (极简) -->
<!-- Clean, high-contrast, zero decoration. For serious/analytical content. -->
<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto; padding: 40px 24px 32px 24px;">

  <!-- Title — clean, no decoration -->
  <h1 style="font-size: 22px; font-weight: bold; color: #1A1A1A; line-height: 1.4; margin: 0 0 8px 0;">
    {{ARTICLE_TITLE}}
  </h1>

  <p style="font-size: 13px; color: #8A8A8A; margin: 0 0 40px 0;">
    {{AUTHOR_NAME}} · {{PUBLISH_DATE}}
  </p>

  <!-- 1px divider — the only decorative element -->
  <div style="width: 100%; height: 1px; background: #1A1A1A; margin: 0 0 40px 0;"></div>

  {{ARTICLE_BODY}}

  <!-- Image — clean, full-width, no radius -->
  <img src="{{BODY_IMAGE_URL}}" style="display: block; width: 100%; height: auto; margin: 40px 0;">

  {{CONTINUED_BODY}}

  <!-- Simple list -->
  <ul style="margin: 32px 0; padding: 0; list-style: none;">
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM1}}
    </li>
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM2}}
    </li>
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM3}}
    </li>
    <li style="font-size: 15px; color: #1A1A1A; line-height: 1.8; padding: 12px 0; border-bottom: 1px solid #E5E5E5;">
      {{LIST_ITEM4}}
    </li>
  </ul>

  {{MORE_BODY}}

  <!-- Quote — minimal treatment -->
  <div style="margin: 40px 0; padding: 0 0 0 16px; border-left: 2px solid #1A1A1A;">
    <p style="font-size: 15px; color: #4A4A4A; line-height: 1.8; margin: 0;">
      "{{MINIMAL_QUOTE}}"
    </p>
    <p style="font-size: 13px; color: #8A8A8A; margin: 12px 0 0 0;">
      {{QUOTE_ATTRIBUTION}}
    </p>
  </div>

  {{REMAINING_BODY}}

  <!-- Footer — simple underline link -->
  <div style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #E5E5E5;">
    <p style="font-size: 14px; color: #1A1A1A; margin: 0 0 16px 0;">
      <a href="{{RELATED_URL}}" style="color: #1A1A1A; text-decoration: underline; text-underline-offset: 3px;">{{RELATED_TEXT}}</a>
    </p>
    <p style="font-size: 12px; color: #8A8A8A; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>
