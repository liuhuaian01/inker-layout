<!-- WeChat Article Template: Gallery Artistic (艺术) -->
<!-- Museum white, dramatic negative space, serif-forward. -->
<!-- Replace {{PLACEHOLDER}} values before use -->

<div style="max-width: 677px; margin: 0 auto; padding: 40px 32px 48px 32px;">

  <!-- Title — serif, generous spacing -->
  <p style="font-size: 12px; color: #888888; letter-spacing: 8px; text-transform: uppercase; margin: 0 0 24px 0; text-align: center;">
    {{SECTION_LABEL}}
  </p>
  <h1 style="font-size: 24px; font-weight: normal; color: #1C1C1C; line-height: 1.5; margin: 0 0 32px 0; text-align: center; font-family: 'Songti SC', 'SimSun', 'Noto Serif CJK SC', serif;">
    {{ARTICLE_TITLE}}
  </h1>

  <!-- Thin ornamental divider -->
  <div style="text-align: center; margin: 0 0 40px 0;">
    <span style="display: inline-block; width: 60px; height: 1px; background: #1C1C1C;"></span>
  </div>

  <!-- Lead paragraph — larger, serif, wide line-height -->
  <p style="font-size: 16px; color: #555555; line-height: 2.0; margin: 0 0 48px 0; font-family: 'Songti SC', 'SimSun', 'Noto Serif CJK SC', serif;">
    {{LEAD_PARAGRAPH}}
  </p>

  {{ARTICLE_BODY}}

  <!-- Framed Image -->
  <div style="margin: 48px 0;">
    <div style="padding: 8px; border: 1px solid #E0E0E0;">
      <img src="{{FRAMED_IMAGE_URL}}" style="display: block; width: 100%; height: auto;">
    </div>
    <p style="font-size: 12px; color: #888888; margin: 10px 0 0 0; text-align: right; font-style: italic;">
      {{IMAGE_CAPTION}}
    </p>
  </div>

  {{CONTINUED_BODY}}

  <!-- Block Quote — indented, large serif, no background -->
  <div style="margin: 48px 0; padding: 0 0 0 40px; border-left: 1px solid #1C1C1C;">
    <p style="font-size: 18px; color: #1C1C1C; line-height: 1.8; margin: 0; font-family: 'Songti SC', 'SimSun', 'Noto Serif CJK SC', serif; font-style: italic;">
      "{{BLOCK_QUOTE}}"
    </p>
    <p style="font-size: 13px; color: #888888; margin: 16px 0 0 0;">
      {{QUOTE_ATTRIBUTION}}
    </p>
  </div>

  {{REMAINING_BODY}}

  <!-- Ornamental divider -->
  <div style="margin: 48px 0; text-align: center;">
    <span style="display: inline-block; width: 40px; height: 1px; background: #1C1C1C;"></span>
    <span style="display: inline-block; width: 6px; height: 6px; margin: 0 12px; vertical-align: middle; background: #D4A574; border-radius: 50%;"></span>
    <span style="display: inline-block; width: 40px; height: 1px; background: #1C1C1C;"></span>
  </div>

  <!-- Related reading — underline links -->
  <div style="margin-top: 40px;">
    <p style="font-size: 12px; color: #888888; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 16px 0;">
      {{RELATED_LABEL}}
    </p>
    <p style="font-size: 15px; color: #1C1C1C; line-height: 2.0; margin: 0;">
      <a href="{{LINK1_URL}}" style="color: #1C1C1C; text-decoration: underline; text-underline-offset: 4px;">{{LINK1_TEXT}}</a>
    </p>
    <p style="font-size: 15px; color: #1C1C1C; line-height: 2.0; margin: 4px 0 0 0;">
      <a href="{{LINK2_URL}}" style="color: #1C1C1C; text-decoration: underline; text-underline-offset: 4px;">{{LINK2_TEXT}}</a>
    </p>
  </div>

  <!-- Footer -->
  <div style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #E0E0E0; text-align: center;">
    <p style="font-size: 12px; color: #888888; margin: 0 0 8px 0; letter-spacing: 2px;">
      {{PUBLICATION_NAME}}
    </p>
    <p style="font-size: 11px; color: #B0B0B0; margin: 0;">
      {{FOOTER_TEXT}}
    </p>
  </div>

</div>
