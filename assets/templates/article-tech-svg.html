<!-- WeChat Article Template: Tech Blue + SVG Progress (科技+SVG进度条) -->

<!-- 复制工具栏 — 浏览器预览时显示,复制时自动排除 -->
<div id="copy-toolbar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);">
  <button id="copy-btn" onclick="copyToWechat()" style="padding:10px 28px;background:linear-gradient(135deg,#07C160,#06AD56);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
    📋 一键复制到微信公众号
  </button>
  <span style="color:#888;font-size:12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">复制后 Ctrl+V 粘贴到微信后台</span>
</div>

<div style="height:50px;"></div>

<!-- 文章内容 — 此区域内的内容为复制目标 -->
<div id="article-content">

<!-- Data-forward article with animated progress visualization -->
<!-- Replace {{PLACEHOLDER}} values -->

<div style="max-width: 677px; margin: 0 auto; padding: 32px 20px 24px 20px;">

  <!-- Title -->
  <h1 style="font-size: 22px; font-weight: bold; color: #2C3E50; line-height: 1.4; margin: 0 0 8px 0; text-align: center;">
    {{ARTICLE_TITLE}}
  </h1>
  <p style="font-size: 13px; color: #95A5A6; text-align: center; margin: 0 0 28px 0;">
    {{AUTHOR_NAME}} · {{PUBLISH_DATE}}
  </p>

  <!-- SVG Progress Dashboard -->
  <div style="margin: 0 0 32px 0;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 637 320" width="100%" height="auto"
         style="display: block; margin: 0 auto;">

      <defs>
        <style>
          @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
          }
          .metric-1 { animation: fadeInUp 0.6s 0.2s ease-out both; }
          .metric-2 { animation: fadeInUp 0.6s 0.5s ease-out both; }
          .metric-3 { animation: fadeInUp 0.6s 0.8s ease-out both; }
          .metric-4 { animation: fadeInUp 0.6s 1.1s ease-out both; }
        </style>
        <linearGradient id="progressBlue" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#3498DB"/>
          <stop offset="100%" stop-color="#2C3E50"/>
        </linearGradient>
        <linearGradient id="progressCyan" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#00D2FF"/>
          <stop offset="100%" stop-color="#3498DB"/>
        </linearGradient>
        <linearGradient id="progressGreen" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#A8E6CF"/>
          <stop offset="100%" stop-color="#5B8C5A"/>
        </linearGradient>
      </defs>

      <!-- Title -->
      <text x="319" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D6D7E"
            font-family="PingFang SC, Microsoft YaHei, sans-serif">{{DASHBOARD_TITLE}}</text>

      <!-- Metric 1 -->
      <g class="metric-1">
        <text x="20" y="68" font-size="13" fill="#2C3E50"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{METRIC1_LABEL}}</text>
        <text x="617" y="68" text-anchor="end" font-size="13" font-weight="bold" fill="#3498DB"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{METRIC1_VALUE}}</text>
        <rect x="20" y="78" width="597" height="10" rx="5" fill="#EBF0F5"/>
        <rect x="20" y="78" width="0" height="10" rx="5" fill="url(#progressBlue)">
          <animate attributeName="width" from="0" to="{{METRIC1_WIDTH}}" dur="1.5s" fill="freeze"/>
        </rect>
      </g>

      <!-- Metric 2 -->
      <g class="metric-2">
        <text x="20" y="128" font-size="13" fill="#2C3E50"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{METRIC2_LABEL}}</text>
        <text x="617" y="128" text-anchor="end" font-size="13" font-weight="bold" fill="#3498DB"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{METRIC2_VALUE}}</text>
        <rect x="20" y="138" width="597" height="10" rx="5" fill="#EBF0F5"/>
        <rect x="20" y="138" width="0" height="10" rx="5" fill="url(#progressCyan)">
          <animate attributeName="width" from="0" to="{{METRIC2_WIDTH}}" dur="1.5s" begin="0.3s" fill="freeze"/>
        </rect>
      </g>

      <!-- Metric 3 -->
      <g class="metric-3">
        <text x="20" y="188" font-size="13" fill="#2C3E50"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{METRIC3_LABEL}}</text>
        <text x="617" y="188" text-anchor="end" font-size="13" font-weight="bold" fill="#3498DB"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{METRIC3_VALUE}}</text>
        <rect x="20" y="198" width="597" height="10" rx="5" fill="#EBF0F5"/>
        <rect x="20" y="198" width="0" height="10" rx="5" fill="url(#progressGreen)">
          <animate attributeName="width" from="0" to="{{METRIC3_WIDTH}}" dur="1.5s" begin="0.6s" fill="freeze"/>
        </rect>
      </g>

      <!-- Big Number -->
      <g class="metric-4">
        <text x="319" y="280" text-anchor="middle" font-size="36" font-weight="bold" fill="#2C3E50"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{BIG_NUMBER}}</text>
        <text x="319" y="305" text-anchor="middle" font-size="12" fill="#95A5A6"
              font-family="PingFang SC, Microsoft YaHei, sans-serif">{{BIG_NUMBER_LABEL}}</text>
      </g>

    </svg>
  </div>

  {{ARTICLE_BODY}}

  <!-- Info Card -->
  <div style="margin: 32px 0; padding: 24px 20px; background: #F4F6F8; border-radius: 12px; border-left: 4px solid #3498DB;">
    <p style="font-size: 14px; font-weight: bold; color: #2C3E50; margin: 0 0 8px 0;">{{INFO_TITLE}}</p>
    <p style="font-size: 14px; color: #5D6D7E; line-height: 1.7; margin: 0;">{{INFO_CONTENT}}</p>
  </div>

  {{REMAINING_BODY}}

  <!-- CTA -->
  <div style="text-align: center; margin: 40px 0 24px 0;">
    <a href="{{CTA_LINK}}" style="display: inline-block; padding: 14px 36px; background: #3498DB; color: #FFFFFF; font-size: 15px; font-weight: bold; border-radius: 8px; text-decoration: none; box-shadow: 0 4px 12px rgba(52,152,219,0.3);">
      {{CTA_TEXT}}
    </a>
  </div>

  <!-- Footer -->
  <div style="padding-top: 24px; border-top: 1px solid #EBF0F5; text-align: center;">
    <p style="font-size: 12px; color: #95A5A6; margin: 0 0 4px 0;">{{COMPANY_NAME}}</p>
    <p style="font-size: 11px; color: #B0B8C0; margin: 0;">{{FOOTER_TEXT}}</p>
  </div>

</div>


</div>
<!-- /文章内容结束 -->

<script>
function sanitizeForWechat(html){
  /* 微信会丢弃这些 CSS 属性，提前清除避免样式变形 */
  var d=document.createElement('div');
  d.innerHTML=html;
  var all=d.querySelectorAll('*');
  for(var i=0;i<all.length;i++){
    var s=all[i].getAttribute('style');
    if(!s)continue;
    /* 移除不兼容属性 */
    s=s.replace(/letter-spacing\s*:[^;"]+;?/gi,'');
    s=s.replace(/transform\s*:[^;"]+;?/gi,'');
    s=s.replace(/animation\s*:[^;"]+;?/gi,'');
    s=s.replace(/position\s*:\s*(absolute|fixed|sticky)[^;"]*;?/gi,'');
    s=s.replace(/display\s*:\s*(flex|grid)[^;"]*;?/gi,'');
    s=s.replace(/z-index\s*:[^;"]+;?/gi,'');
    /* 百分比单位改px(不安全) */
    s=s.replace(/([\d.]+)%/g,function(m,n){var v=parseFloat(n);if(v>100)return'100%';return m;});
    all[i].setAttribute('style',s.replace(/;+/g,';'));
  }
  return d.innerHTML;
}

async function copyToWechat(){
  var content=document.getElementById('article-content');
  var html=content.innerHTML;
  /* 微信安全清洗 */
  html=sanitizeForWechat(html);
  var blob=new Blob([html],{type:'text/html'});
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':blob})]);
    var btn=document.getElementById('copy-btn');
    btn.innerHTML='✅ 已复制！去微信后台 Ctrl+V 粘贴';
    btn.style.background='linear-gradient(135deg,#06AD56,#05944A)';
    setTimeout(function(){btn.innerHTML='📋 一键复制到微信公众号';btn.style.background='linear-gradient(135deg,#07C160,#06AD56)';},3000);
  }catch(e){
    /* 降级：execCommand 兜底 */
    var range=document.createRange();
    range.selectNodeContents(content);
    var sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try{document.execCommand('copy');}catch(e2){}
    sel.removeAllRanges();
    alert('请手动 Ctrl+A 全选后 Ctrl+C 复制');
  }
}
</script>
